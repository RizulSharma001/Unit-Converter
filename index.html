<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="title">Unit<span>.</span>Convert</div>
    </div>
    <div class="badge">Converter</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="length" onclick="switchTab('length')">Length</button>
    <button class="tab-btn" data-tab="weight" onclick="switchTab('weight')">Weight</button>
    <button class="tab-btn" data-tab="temperature" onclick="switchTab('temperature')">Temp</button>
  </div>

  <div class="panel active" id="panel-length">
    <div class="field">
      <label>Value to Convert</label>
      <input type="number" id="length-value" placeholder="e.g. 100" step="any">
    </div>
    <div class="unit-row">
      <div class="field" style="margin-bottom:0">
        <label>From</label>
        <select id="length-from">
          <option value="mm">Millimeter (mm)</option>
          <option value="cm">Centimeter (cm)</option>
          <option value="m" selected>Meter (m)</option>
          <option value="km">Kilometer (km)</option>
          <option value="in">Inch (in)</option>
          <option value="ft">Foot (ft)</option>
          <option value="yd">Yard (yd)</option>
          <option value="mi">Mile (mi)</option>
        </select>
      </div>
      <button class="swap-btn" onclick="swapUnits('length')" title="Swap units">⇄</button>
      <div class="field" style="margin-bottom:0">
        <label>To</label>
        <select id="length-to">
          <option value="mm">Millimeter (mm)</option>
          <option value="cm" selected>Centimeter (cm)</option>
          <option value="m">Meter (m)</option>
          <option value="km">Kilometer (km)</option>
          <option value="in">Inch (in)</option>
          <option value="ft">Foot (ft)</option>
          <option value="yd">Yard (yd)</option>
          <option value="mi">Mile (mi)</option>
        </select>
      </div>
    </div>
    <button class="convert-btn" onclick="convert('length')">Convert →</button>
    <p class="error-msg" id="length-error">Please enter a valid number.</p>
    <div class="result-box" id="length-result">
      <div class="result-label">Result of your calculation</div>
      <div class="result-value" id="length-result-value"></div>
      <div class="result-sub" id="length-result-sub"></div>
      <div class="result-actions">
        <button class="action-btn" onclick="copyResult('length')">⎘ Copy</button>
        <button class="action-btn reset" onclick="reset('length')">↺ Reset</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-weight">
    <div class="field">
      <label>Value to Convert</label>
      <input type="number" id="weight-value" placeholder="e.g. 75" step="any">
    </div>
    <div class="unit-row">
      <div class="field" style="margin-bottom:0">
        <label>From</label>
        <select id="weight-from">
          <option value="mg">Milligram (mg)</option>
          <option value="g">Gram (g)</option>
          <option value="kg" selected>Kilogram (kg)</option>
          <option value="oz">Ounce (oz)</option>
          <option value="lb">Pound (lb)</option>
        </select>
      </div>
      <button class="swap-btn" onclick="swapUnits('weight')" title="Swap units">⇄</button>
      <div class="field" style="margin-bottom:0">
        <label>To</label>
        <select id="weight-to">
          <option value="mg">Milligram (mg)</option>
          <option value="g">Gram (g)</option>
          <option value="kg">Kilogram (kg)</option>
          <option value="oz">Ounce (oz)</option>
          <option value="lb" selected>Pound (lb)</option>
        </select>
      </div>
    </div>
    <button class="convert-btn" onclick="convert('weight')">Convert →</button>
    <p class="error-msg" id="weight-error">Please enter a valid number.</p>
    <div class="result-box" id="weight-result">
      <div class="result-label">Result of your calculation</div>
      <div class="result-value" id="weight-result-value"></div>
      <div class="result-sub" id="weight-result-sub"></div>
      <div class="result-actions">
        <button class="action-btn" onclick="copyResult('weight')">⎘ Copy</button>
        <button class="action-btn reset" onclick="reset('weight')">↺ Reset</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-temperature">
    <div class="field">
      <label>Value to Convert</label>
      <input type="number" id="temperature-value" placeholder="e.g. 100" step="any">
    </div>
    <div class="unit-row">
      <div class="field" style="margin-bottom:0">
        <label>From</label>
        <select id="temperature-from">
          <option value="C" selected>Celsius (°C)</option>
          <option value="F">Fahrenheit (°F)</option>
          <option value="K">Kelvin (K)</option>
        </select>
      </div>
      <button class="swap-btn" onclick="swapUnits('temperature')" title="Swap units">⇄</button>
      <div class="field" style="margin-bottom:0">
        <label>To</label>
        <select id="temperature-to">
          <option value="C">Celsius (°C)</option>
          <option value="F" selected>Fahrenheit (°F)</option>
          <option value="K">Kelvin (K)</option>
        </select>
      </div>
    </div>
    <button class="convert-btn" onclick="convert('temperature')">Convert →</button>
    <p class="error-msg" id="temperature-error">Please enter a valid number.</p>
    <div class="result-box" id="temperature-result">
      <div class="result-label">Result of your calculation</div>
      <div class="result-value" id="temperature-result-value"></div>
      <div class="result-sub" id="temperature-result-sub"></div>
      <div class="result-actions">
        <button class="action-btn" onclick="copyResult('temperature')">⎘ Copy</button>
        <button class="action-btn reset" onclick="reset('temperature')">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
